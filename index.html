body::after{
  content:"";position:fixed;inset:0;
  background:
    radial-gradient(circle at 14% 26%, rgba(255,227,238,.20), transparent 24%),
    radial-gradient(circle at 78% 18%, rgba(255,231,241,.18), transparent 24%),
    radial-gradient(circle at 80% 82%, rgba(255,225,236,.14), transparent 20%);
  pointer-events:none;z-index:0;
}
.font-zh{font-family:var(--font-zh)!important}
.font-en,.font-number,.font-latin{font-family:var(--font-en)!important;letter-spacing:.01em}
.font-script{font-family:var(--font-script)!important;font-weight:500;font-style:italic;letter-spacing:.01em}
.page{position:relative;z-index:1;width:min(calc(100% - 24px),var(--max-width));margin:0 auto;padding:max(20px,env(safe-area-inset-top)) 0 max(28px,env(safe-area-inset-bottom))}
.hero{text-align:center;padding:16px 4px 12px}
.ornament-pill{display:inline-flex;align-items:center;gap:10px;padding:9px 18px;border-radius:var(--radius-pill);background:rgba(255,255,255,.56);border:1px solid rgba(255,255,255,.70);box-shadow:var(--shadow-soft), inset 0 1px 0 rgba(255,255,255,.76);color:var(--rose-600);font-size:.92rem;letter-spacing:.08em;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.signature-card{margin:16px auto 12px;padding:18px 16px;border-radius:30px;background:linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,249,252,.52));border:1px solid rgba(255,255,255,.76);box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.82);overflow:hidden;position:relative;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.signature-card::before,.signature-card::after{content:"";position:absolute;width:78px;height:78px;border-radius:50%;background:radial-gradient(circle, rgba(255,228,239,.74), rgba(255,228,239,0));filter:blur(3px);pointer-events:none}
.signature-card::before{top:-12px;left:-12px} .signature-card::after{bottom:-14px;right:-14px}
.signature-zh{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:10px;color:var(--rose-600);font-size:clamp(2.05rem,10vw,2.9rem);line-height:1.12;text-shadow:0 1px 0 rgba(255,255,255,.84)}
.signature-amp{color:var(--rose-400);font-size:.82em;transform:translateY(-.04em);padding:0 2px;text-shadow:0 1px 0 rgba(255,255,255,.84)}
.signature-divider{display:flex;align-items:center;justify-content:center;gap:10px;margin:10px auto 6px;width:min(300px,78%)}
.signature-divider-line{flex:1;height:1px;background:linear-gradient(90deg, rgba(224,184,203,0), rgba(224,184,203,.88), rgba(224,184,203,0))}
.signature-divider-flower{color:#d99bb7;font-size:.95rem;line-height:1}
.signature-en-wrap{display:flex;align-items:center;justify-content:center;gap:12px}
.signature-en-line{flex:1 1 auto;max-width:72px;height:1px;background:linear-gradient(90deg, rgba(224,184,203,0), rgba(224,184,203,.72), rgba(224,184,203,0))}
.signature-en{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:10px;color:#ce84a7;font-size:clamp(1.56rem,8vw,2.28rem);line-height:1.02;text-shadow:0 1px 0 rgba(255,255,255,.86),0 8px 18px rgba(214,146,177,.18)}
.signature-en .signature-amp-script{color:#df9bbb;font-size:1.04em;opacity:.95;transform:translateY(-.04em)}
.signature-ornament{margin-top:8px;color:#e1a8c4;font-size:.9rem;letter-spacing:.28em;text-indent:.28em;text-align:center}
.venue-chip{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:9px 16px;margin-bottom:14px;border-radius:var(--radius-pill);background:rgba(255,255,255,.56);border:1px solid rgba(255,255,255,.72);box-shadow:var(--shadow-soft), inset 0 1px 0 rgba(255,255,255,.82);color:var(--rose-600);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.venue-dot{width:5px;height:5px;border-radius:50%;background:#e3a8c2;box-shadow:0 0 10px rgba(227,168,194,.46)}
.hero-title{margin:6px 0;color:var(--rose-600);font-size:clamp(1.88rem,9vw,2.7rem);line-height:1.15;text-shadow:0 1px 0 rgba(255,255,255,.78)}

const tableLabels = {"主桌":"主桌","1":"第1桌","2":"第2桌","3":"第3桌","4":"第4桌","5":"第5桌","6":"第6桌","7":"第7桌","8":"第8桌","9":"第9桌","10":"第10桌","11":"第11桌","12":"第12桌","13":"第13桌","14":"第14桌"};
const tableCaption = document.getElementById('tableCaption');
const resultsContainer = document.getElementById('resultsContainer');
const searchInput = document.getElementById('guestSearch');
const searchBtn = document.getElementById('searchBtn');
const clearBtn = document.getElementById('clearBtn');
const resultsSection = document.getElementById('results');
const petalLayer = document.getElementById('petalLayer');

function escapeHtml(value){
  return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function decorateMixedText(text){
  return escapeHtml(String(text||'')).replace(/([A-Za-z0-9&]+)/g,'<span class="font-en">$1</span>');
}
function normalizeText(text){
  return String(text||'').trim().toLowerCase();
}
function getTableLabel(table){
  return tableLabels[table] || table;
}
function renderSvgHighlights(activeTables=[]){
  const activeSet = new Set(activeTables.map(String));
  document.querySelectorAll('.table-node').forEach(node => {
    const table = node.dataset.table;
    node.classList.toggle('active', activeSet.has(table));
  });
}
function renderMessage(title, text){
  resultsContainer.innerHTML = `
    <article class="message-card">
      <h3 class="message-title font-zh">${escapeHtml(title)}</h3>
      <p class="message-text font-zh">${escapeHtml(text)}</p>
    </article>
  `;
}
function scrollToResults(){
  resultsSection.scrollIntoView({behavior:'smooth', block:'start'});
}
function renderResults(results, keyword){
  if(!keyword){
    renderMessage('請輸入姓名開始查詢','請輸入姓名開始查詢桌次資訊。');
    renderSvgHighlights([]);
    tableCaption.textContent = '查詢後將自動圈選桌位位置。';
    tableCaption.classList.add('show');
    return;
  }
  if(!results.length){
    renderMessage('查無符合的賓客資料','請確認姓名是否輸入正確；若仍無法查詢，請洽現場接待人員協助。');
    renderSvgHighlights([]);
    tableCaption.textContent = '目前沒有可圈選的桌位，請再確認搜尋姓名。';
    tableCaption.classList.add('show');
    return;
  }
  const activeTables = [...new Set(results.map(item => item.table))];
  renderSvgHighlights(activeTables);
  tableCaption.textContent = results.length === 1
    ? `已為您圈選 ${getTableLabel(results[0].table)} 的位置。`
    : `已為您圈選 ${activeTables.length} 個相符桌位位置。`;
  tableCaption.classList.add('show');
  resultsContainer.innerHTML = results.map(guest => `
    <article class="result-card">
      <div class="result-top">
        <div class="result-kicker"><span>✦</span><span class="font-zh">桌位資訊</span></div>
        <p class="table-number">${decorateMixedText(getTableLabel(guest.table))}</p>
        <p class="table-label font-zh">${escapeHtml(guest.group)}</p>
      </div>
      <div class="result-body">
        <div class="info-block">
          <div class="info-label font-zh">姓名</div>
          <div class="info-value">${decorateMixedText(guest.name)}</div>
        </div>
        <div class="info-block">
          <div class="info-label font-zh">身分群組</div>
          <div class="badge font-zh">${escapeHtml(guest.group)}</div>
        </div>
        <div class="info-block">
          <div class="info-label font-zh">桌次</div>
          <div class="info-value">${decorateMixedText(getTableLabel(guest.table))}</div>
        </div>
      </div>
    </article>
  `).join('');
}
function searchGuests(){
  const keyword = searchInput.value;
  const normalized = normalizeText(keyword);
  if(!normalized){
    renderResults([], '');
    return;
  }
  const matches = guestData.filter(guest => normalizeText(guest.name).includes(normalized));
  renderResults(matches, normalized);
  scrollToResults();
}
function clearSearch(){
  searchInput.value = '';
  renderResults([], '');
  searchInput.focus();
  window.scrollTo({top:0, behavior:'smooth'});
}
function createPetals(){
  const petals = [];
  for(let i=0;i<14;i+=1){
    const petal = document.createElement('span');
    petal.className = 'petal';
    const size = 10 + Math.random()*14;
    const left = Math.random()*100;
    const duration = 12 + Math.random()*12;
    const delay = Math.random()*-18;
    const drift = -40 + Math.random()*80;
    const sway = 10 + Math.random()*26;
    petal.style.left = `${left}vw`;
    petal.style.width = `${size}px`;
    petal.style.height = `${size*0.76}px`;
    petal.style.animationDuration = `${duration}s, ${4 + Math.random()*3.8}s`;
    petal.style.animationDelay = `${delay}s, ${delay/2}s`;
    petal.style.setProperty('--drift', `${drift}px`);
    petal.style.setProperty('--sway', `${sway}px`);
    petal.style.opacity = (0.42 + Math.random()*0.42).toFixed(2);
    petals.push(petal);
  }
  petalLayer.replaceChildren(...petals);
}
searchBtn.addEventListener('click', searchGuests);
clearBtn.addEventListener('click', clearSearch);
searchInput.addEventListener('keydown', event => {
  if(event.key === 'Enter') {
    event.preventDefault();
    searchGuests();
  }
});
createPetals();
renderSvgHighlights([]);
tableCaption.classList.add('show');
</script>
